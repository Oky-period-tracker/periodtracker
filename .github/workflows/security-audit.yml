name: Security Audit (Test)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  setup-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Environment check
        run: |
          echo "CI/CD test workflow running successfully"
          node --version
          python --version

      - name: Install dependencies (API)
        working-directory: packages/api
        run: |
          npm ci || npm install

      - name: Run ESLint (API)
        working-directory: packages/api
        run: |
          npx eslint . --ext .js,.ts || true

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (SAST)
        run: |
          semgrep --config=auto \
            packages/api \
            packages/cms \
            app/src \
            --json > semgrep-report.json || true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

          