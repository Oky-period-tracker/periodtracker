name: Security Audit (Test)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  setup-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Environment check
        run: |
          echo "CI/CD test workflow running successfully"
          node --version
          python --version

      - name: Install dependencies (API)
        working-directory: packages/api
        run: |
          npm ci || npm install

      - name: Run ESLint (API)
        working-directory: packages/api
        run: |
          npx eslint . --ext .js,.ts || true

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Semgrep (SAST)
        run: |
          semgrep --config=auto \
            packages/api \
            packages/cms \
            app/src \
            --json > semgrep-report.json || true

      - name: Convert Semgrep report to CSV
        run: |
          # Create CSV headers
          echo "Severity,Category,Issue Title,File,Line,Description,Impact,Fix Complexity" > semgrep-findings.csv
          echo "Severity,Count,Status" > semgrep-summary.csv

          # Detailed findings
          jq -r '
            .results[] |
            def category:
              if (.check_id | test("xss|XSS")) then "Cross-Site Scripting"
              elif (.check_id | test("prototype-pollution")) then "Prototype Pollution"
              elif (.check_id | test("dockerfile")) then "Container Security"
              else "General Security"
              end;

            def severity:
              if (.check_id | test("xss|prototype-pollution")) then "High"
              elif (.check_id | test("dockerfile")) then "Medium"
              else "Low"
              end;

            [
              severity,
              category,
              (.check_id | split(".")[-1]),
              .path,
              .start.line,
              ((.message // .extra.message // "") | gsub("[\n\r]"; " ")),
              "Potential security risk if exploitable",
              (if severity == "High" then "Medium" elif severity == "Medium" then "Low" else "Low" end)
            ] | @csv
          ' semgrep-report.json >> semgrep-findings.csv || true

          # Severity summary
          jq -r '
            .results
            | group_by(.check_id)
            | map({
                sev: (
                  if (.[0].check_id | test("xss|prototype-pollution")) then "High"
                  elif (.[0].check_id | test("dockerfile")) then "Medium"
                  else "Low"
                  end
                )
              })
            | group_by(.sev)
            | map({
                severity: .[0].sev,
                count: length,
                status: (
                  if .[0].sev == "High" then "Under Review"
                  elif .[0].sev == "Medium" then "Planned"
                  else "Accepted"
                  end
                )
              })
            | .[]
            | [.severity, .count, .status] | @csv
          ' semgrep-report.json >> semgrep-summary.csv || true

      - name: Upload Semgrep reports
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-report.json
            semgrep-findings.csv
            semgrep-summary.csv
        
      - name: npm audit (API)
        working-directory: packages/api
        run: |
          npm audit --audit-level=high --json > ../../api-npm-audit.json || true

      - name: npm audit (CMS)
        working-directory: packages/cms
        run: |
          npm audit --audit-level=high --json > ../../cms-npm-audit.json || true

      - name: Convert npm audit report to CSV
        run: |
          # CSV header
          echo "Package,Severity,Vulnerability,DependencyType,FixAvailable" > npm-audit.csv

          # Parse API npm audit JSON
          jq -r '
            .vulnerabilities
            | to_entries[]
            | [
                .key,
                .value.severity,
                (.value.via[0].title // "N/A"),
                (if .value.isDirect then "Direct" else "Transitive" end),
                (if .value.fixAvailable then "Yes" else "No" end)
              ]
            | @csv
          ' api-npm-audit.json >> npm-audit.csv || true 

      - name: Upload npm audit reports
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-reports
          path: |
            api-npm-audit.json
            cms-npm-audit.json
            npm-audit.csv     

      - name: Run Gitleaks (Full Git History)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --report-format json --report-path gitleaks-report.json --no-git=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Run TruffleHog (Full Git History)
        uses: trufflesecurity/trufflehog@main
        with:
          scan: git
          path: .
          format: json
          output: trufflehog-report.json


      - name: Ensure TruffleHog report exists
        run: |
          if [ ! -f trufflehog-report.json ]; then
            echo "{}" > trufflehog-report.json
          fi

      - name: Upload TruffleHog report
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-report.json