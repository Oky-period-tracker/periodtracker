name: Security Audit (Test)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  setup-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Environment check
        run: |
          echo "CI/CD test workflow running successfully"
          node --version
          python --version

      - name: Install dependencies (API)
        working-directory: packages/api
        run: |
          npm ci || npm install

      - name: Run ESLint (API)
        working-directory: packages/api
        run: |
          npx eslint . --ext .js,.ts || true

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (SAST)
        run: |
          semgrep --config=auto \
            packages/api \
            packages/cms \
            app/src \
            --json > semgrep-report.json || true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

      - name: npm audit (API)
        working-directory: packages/api
        run: |
          npm audit --audit-level=high --json > ../../api-npm-audit.json || true

      - name: npm audit (CMS)
        working-directory: packages/cms
        run: |
          npm audit --audit-level=high --json > ../../cms-npm-audit.json || true

      - name: Upload npm audit reports
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-reports
          path: |
            api-npm-audit.json
            cms-npm-audit.json     

      - name: Run Gitleaks (Full Git History)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --report-format json --report-path gitleaks-report.json --no-git=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Run TruffleHog (Full Git History)
        uses: trufflesecurity/trufflehog@main
        with:
          scan: git
          path: .
          format: json
          output: trufflehog-report.json


      - name: Ensure TruffleHog report exists
        run: |
          if [ ! -f trufflehog-report.json ]; then
            echo "{}" > trufflehog-report.json
          fi

      - name: Upload TruffleHog report
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-report.json