version: '3.4'
services:
  base:
    image: oky/base
    build:
      context: .
    command: /bin/true
  api:
    build:
      context: packages/api/.
    ports:
      - 3000:3000
    env_file: packages/api/.env
    depends_on:
      - base
  cms:
    build:
      context: packages/cms/.
    ports:
      - 5000:5000
    env_file: packages/cms/.env
    depends_on:
      - base
      - postgres
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:5000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); });"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  postgres:
    image: postgres:10-alpine
    volumes:
      - db-data:/var/lib/postgresql/data:rw
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=periodtracker
      - POSTGRES_USER=periodtracker
      - POSTGRES_PASSWORD=periodtracker
volumes:
  db-data: {}
